<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You</title>
<style>
  /* General Reset */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #74ebd5, #acb6e5);
    color: #333;
  }

  .thank-you-container {
    background: #fff;
    padding: 50px 40px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    text-align: center;
    max-width: 500px;
    width: 90%;
    animation: fadeIn 1s ease-in-out;
  }

  h1 {
    font-size: 2.5em;
    color: #4CAF50;
    margin-bottom: 20px;
  }

  p {
    font-size: 1.1em;
    margin-bottom: 30px;
    color: #555;
  }

  a.button {
    display: inline-block;
    padding: 12px 30px;
    background: #4CAF50;
    color: #fff;
    text-decoration: none;
    border-radius: 8px;
    transition: 0.3s;
  }

  a.button:hover {
    background: #45a049;
  }

  @keyframes fadeIn {
    from {opacity: 0; transform: translateY(-20px);}
    to {opacity: 1; transform: translateY(0);}
  }

  /* Responsive */
  @media (max-width: 600px) {
    .thank-you-container {
      padding: 30px 20px;
    }

    h1 {
      font-size: 2em;
    }
  }
</style>
</head>
<body>

<div class="thank-you-container">
  <h1>Thank You!</h1>
  <p>Your message has been sent successfully. We will contact you shortly.</p>
  <a class="button" href="index.html">Go Back Home</a>
</div>

</body>
</html>
